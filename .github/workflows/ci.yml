name: CI

on:
  push:
    branches: [develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JWT_ACCESS_SECRET: ci-test-jwt-secret-minimum-32-characters-long
  CORS_ORIGINS: http://localhost:3000
  PROCESSOR_URL: http://localhost:9999
  NODE_ENV: test

jobs:
  lint-node:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node-api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: node-api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm run format:check
      - run: npx tsc --noEmit -p tsconfig.build.json

  lint-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            python-service/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: lint-imports

  test-node:
    runs-on: ubuntu-latest
    needs: lint-node
    defaults:
      run:
        working-directory: node-api
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/payments_test
      DATABASE_URL_TEST: postgresql://postgres:postgres@localhost:5432/payments_test
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: payments_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: node-api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run test:unit -- --passWithNoTests
      - run: npm run test:integration
      - run: npm run test:e2e -- --passWithNoTests

  test-python:
    runs-on: ubuntu-latest
    needs: lint-python
    defaults:
      run:
        working-directory: python-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            python-service/requirements.txt
            python-service/requirements-dev.txt
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - run: pytest --cov=app --cov-report=xml --cov-fail-under=75

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - run: cd node-api && npm ci && npm audit --audit-level=high
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install pip-audit && cd python-service && pip-audit -r requirements.txt

  build:
    runs-on: ubuntu-latest
    needs: [test-node, test-python]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build node-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node-api.Dockerfile
          push: false
          tags: payment-system/node-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build python-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/python-service.Dockerfile
          push: false
          tags: payment-system/python-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

# E2E integration stack — Postgres test DB + live Python processor (no Node container).
# Usage:
#   docker compose -f docker-compose.e2e.yml --profile e2e up -d
#   cd node-api && npm run test:e2e:live
#   cd node-api && npm run test:idempotency-concurrency

name: payment-system-e2e

services:
  postgres-test:
    profiles: [e2e]
    image: postgres:18-alpine
    container_name: payment-e2e-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-payments_test}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_TEST_USER:-postgres} -d ${POSTGRES_TEST_DB:-payments_test}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  python-service:
    profiles: [e2e]
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    container_name: payment-e2e-python-service
    environment:
      PYTHON_SERVICE_PORT: ${PYTHON_SERVICE_PORT:-8000}
      PROCESSOR_APPROVAL_SEED: ${PROCESSOR_APPROVAL_SEED:-42}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "9000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

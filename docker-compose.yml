services:
  postgres:
    image: postgres:18-alpine
    container_name: payment-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-payments}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-payments}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres-test:
    image: postgres:18-alpine
    container_name: payment-postgres-test
    environment:
      POSTGRES_USER: ${POSTGRES_TEST_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_TEST_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_TEST_DB:-payments_test}
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    tmpfs:
      - /var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER:-postgres} -d ${POSTGRES_TEST_DB:-payments_test}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  python-service:
    build:
      context: .
      dockerfile: docker/python-service.Dockerfile
    container_name: payment-python-service
    environment:
      PYTHON_SERVICE_PORT: ${PYTHON_SERVICE_PORT:-8000}
      PROCESSOR_APPROVAL_SEED: ${PROCESSOR_APPROVAL_SEED:-42}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "9000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  node-api:
    build:
      context: .
      dockerfile: docker/node-api.Dockerfile
    container_name: payment-node-api
    env_file:
      - .env
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      NODE_API_PORT: ${NODE_API_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-payments}
      DATABASE_URL_TEST: postgresql://${POSTGRES_TEST_USER:-postgres}:${POSTGRES_TEST_PASSWORD:-postgres}@postgres-test:5432/${POSTGRES_TEST_DB:-payments_test}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      PROCESSOR_URL: http://python-service:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${NODE_API_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      python-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
